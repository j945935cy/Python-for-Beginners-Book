name: Build Book

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pandoc
        uses: pandoc/actions/setup@v1

      - name: Build HTML
        shell: pwsh
        run: ./scripts/build-html.ps1

      - name: Build EPUB
        shell: pwsh
        run: ./scripts/build-epub.ps1

      - name: Upload EPUB
        uses: actions/upload-artifact@v4
        with:
          name: python-for-beginners-epub
          path: output/epub/python-for-beginners.epub
